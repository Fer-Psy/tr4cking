{% load crispy_forms_tags %}

<div class="modal-header">
    <h5 class="modal-title">
        <i class="bi bi-map me-2 text-primary"></i>
        {% if object %}Editar Itinerario{% else %}Nuevo Itinerario{% endif %}
    </h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<form hx-post="{% if object %}{% url 'itineraries:itinerario_update' object.pk %}{% else %}{% url 'itineraries:itinerario_create' %}{% endif %}"
      hx-target="#modal-itinerario .modal-content"
      novalidate>
    {% csrf_token %}
    <div class="modal-body">
        <div class="row">
            <div class="col-md-12">
                {% crispy form %}
            </div>
        </div>
        
        <div class="mt-4 p-3 bg-light rounded-3">
            <h6 class="fw-semibold mb-2">
                <i class="bi bi-info-circle me-1"></i>
                Guía rápida: Días de operación
            </h6>
            <p class="text-secondary small mb-2">
                Usa 7 dígitos (1=Opera, 0=No opera). De lunes a domingo.
            </p>
            <div class="d-flex gap-2 flex-wrap">
                <span class="badge bg-blue-lt">1111111 = Diario</span>
                <span class="badge bg-indigo-lt">1111100 = Lun a Vie</span>
                <span class="badge bg-purple-lt">0000011 = Sáb y Dom</span>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-link link-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-primary ms-auto">
            <i class="bi bi-check-lg me-2"></i>
            {% if object %}Guardar Cambios{% else %}Crear Itinerario{% endif %}
        </button>
    </div>
</form>
