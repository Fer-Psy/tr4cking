{% load crispy_forms_tags %}
<div class="modal-header border-bottom-0 pb-0 shadow-none">
    <div class="text-center w-100">
        <h2 class="h1 mb-1">Crear Cuenta de Cliente</h2>
        <p class="text-muted small">Complete sus datos para empezar</p>
    </div>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<div class="modal-body pt-0">
    <form method="post" action="{% url 'users:cliente_registro' %}" 
          hx-post="{% url 'users:cliente_registro' %}"
          hx-target="#modal-register-content"
          autocomplete="off">
        {% csrf_token %}
        {% crispy form %}
        
        <div class="mb-3 mt-4">
            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-person-check me-2"></i>Finalizar Registro
            </button>
        </div>
        <div class="text-center">
            <p class="text-muted small mb-0">Al registrarte, aceptas nuestros términos y condiciones.</p>
        </div>
    </form>
</div>
